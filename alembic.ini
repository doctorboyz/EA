# Alembic Configuration - Aureus AI Trading Bot

[alembic]
# Path to migration scripts
script_location = database/migrations

# Template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# Version path separator (default: os)
version_path_separator = os

# SQLAlchemy URL - overridden in env.py from config/system.yaml
sqlalchemy.url = postgresql://postgres:password@localhost:5432/aureus

[post_write_hooks]
# No post-write hooks for now

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
