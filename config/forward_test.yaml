# Forward Test Promotion Criteria
# Aureus AI — Demo → Real Promotion Pipeline

# ─── Promotion Gate ───────────────────────────────────────────────────────────
# A champion EA must satisfy ALL criteria below before being promoted to real

promotion_criteria:
  min_days_running: 7          # Must run at least N days on demo
  min_trades: 20               # Minimum closed trades required
  min_profit_factor: 1.3       # PF must be >= this
  max_drawdown_pct: 12.0       # DD must be <= this (matches emergency threshold)
  max_pf_degradation: 0.3      # Forward PF can't drop more than this vs backtest PF

# ─── Auto Promotion ───────────────────────────────────────────────────────────
auto_promote: true             # Set false to require manual promotion
poll_interval_minutes: 10      # How often to check forward test status

# ─── Failure Timeout ──────────────────────────────────────────────────────────
# If criteria not met within (min_days_running * 3) days → mark failed
# Default: 7 * 3 = 21 days

# ─── Per-Symbol Overrides ─────────────────────────────────────────────────────
# These override the defaults above for a specific symbol
symbol_overrides:
  XAUUSD:
    min_profit_factor: 1.2    # Gold is harder to trade, relax PF slightly
    max_drawdown_pct: 15.0    # Gold has higher volatility
    min_trades: 15            # Fewer signals on gold

  GBPUSD:
    min_profit_factor: 1.3
    max_drawdown_pct: 12.0

# ─── News Safety ──────────────────────────────────────────────────────────────
news_blackout_minutes_before: 30   # Close positions N minutes before high-impact news
news_blackout_minutes_after:  30   # Don't trade N minutes after news
news_impact_filter: "high"         # Filter: "high" | "medium" | "all"

# ─── Champion Comparison ──────────────────────────────────────────────────────
# When promoting a new champion, compare against the current live EA
# Only promote if new champion is clearly better
champion_comparison:
  min_pf_improvement: 0.05    # New champion must be at least 0.05 better PF
  min_dd_improvement: 0.0     # DD can be equal or better (0 = no degradation allowed)
